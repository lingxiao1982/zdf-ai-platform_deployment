# /etc/nginx/sites-available/zdfai.site
# 部署完成后：sudo ln -s /etc/nginx/sites-available/zdfai.site /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name zdfai.site www.zdfai.site;

    # Let's Encrypt 申请证书时需要此路径
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其余请求全部跳转 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name zdfai.site www.zdfai.site;

    ssl_certificate     /etc/letsencrypt/live/zdfai.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zdfai.site/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 请求头传递
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 全部转发给 Node.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        proxy_pass http://127.0.0.1:3000;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
