version: "3.9"

services:
  zdfai:
    build: .
    container_name: zdfai-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - zdfai-data:/app/backend/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - VLLM_BASE_URL=${VLLM_BASE_URL:-}
    networks:
      - zdfai-net

  nginx:
    image: nginx:alpine
    container_name: zdfai-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
      - ssl-certs:/etc/nginx/ssl:ro
    depends_on:
      - zdfai
    networks:
      - zdfai-net

  ollama:
    image: ollama/ollama:latest
    container_name: zdfai-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    profiles:
      - local-models
    networks:
      - zdfai-net

volumes:
  zdfai-data:
  ssl-certs:
  ollama-models:

networks:
  zdfai-net:
    driver: bridge
